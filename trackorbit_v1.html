<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TracKorbit v1.0</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f4ff;color:#1a1a2e;min-height:100vh}
:root{
  --blue:#1a56db;--blue-dark:#1240a8;--blue-light:#e8f0fe;--blue-mid:#3b7de9;
  --white:#fff;--gray-50:#f8faff;--gray-100:#f0f4ff;--gray-200:#e2e8f8;
  --gray-300:#cbd5e8;--gray-400:#94a3b8;--gray-500:#64748b;--gray-600:#475569;
  --gray-700:#334155;--gray-800:#1e293b;--text:#1a1a2e;
  --green:#16a34a;--red:#dc2626;--orange:#ea580c;--yellow:#ca8a04;--purple:#7c3aed;
  --sidebar-w:220px;--header-h:52px;
  --shadow:0 1px 4px rgba(26,86,219,.10);--shadow-md:0 4px 16px rgba(26,86,219,.13);
}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit;outline:none}
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.header{height:var(--header-h);background:var(--white);border-bottom:1.5px solid var(--gray-200);display:flex;align-items:center;padding:0 20px;gap:16px;z-index:100;flex-shrink:0}
.logo{display:flex;align-items:center;gap:8px;font-size:18px;font-weight:700;color:var(--blue);letter-spacing:-.5px}
.logo-icon{width:30px;height:30px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:800}
.header-nav{display:flex;gap:4px;flex:1;margin-left:8px}
.header-nav button{padding:6px 12px;border:none;background:none;border-radius:6px;font-size:13px;color:var(--gray-600);font-weight:500;transition:all .15s}
.header-nav button:hover{background:var(--blue-light);color:var(--blue)}
.header-nav button.active{background:var(--blue-light);color:var(--blue);font-weight:600}
.header-right{display:flex;align-items:center;gap:10px;margin-left:auto}
.btn{padding:7px 16px;border-radius:7px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{background:var(--blue-dark)}
.btn-outline{background:none;border:1.5px solid var(--blue);color:var(--blue)}.btn-outline:hover{background:var(--blue-light)}
.btn-sm{padding:5px 11px;font-size:12px;border-radius:5px}
.btn-danger{background:var(--red);color:#fff}
.btn-ghost{background:none;border:none;color:var(--gray-500);font-size:13px}.btn-ghost:hover{color:var(--blue)}
.body-wrap{display:flex;flex:1;overflow:hidden}
.sidebar{width:var(--sidebar-w);background:var(--white);border-right:1.5px solid var(--gray-200);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;padding:12px 0}
.sidebar-section{padding:0 10px;margin-bottom:4px}
.sidebar-label{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--gray-400);font-weight:600;padding:10px 8px 4px}
.sidebar-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;cursor:pointer;font-size:13px;color:var(--gray-600);font-weight:500;transition:all .15s;margin:1px 0}
.sidebar-item:hover{background:var(--blue-light);color:var(--blue)}
.sidebar-item.active{background:var(--blue-light);color:var(--blue);font-weight:600}
.main{flex:1;overflow-y:auto;overflow-x:hidden;background:var(--gray-100)}
.page{padding:24px 28px}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.page-title{font-size:20px;font-weight:700;color:var(--text)}
.page-sub{font-size:13px;color:var(--gray-500);margin-top:2px}
.card{background:var(--white);border-radius:10px;border:1.5px solid var(--gray-200);padding:18px 20px;box-shadow:var(--shadow)}
.card-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:10px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.stat-card{background:var(--white);border-radius:10px;border:1.5px solid var(--gray-200);padding:16px 18px;box-shadow:var(--shadow)}
.stat-val{font-size:28px;font-weight:700;color:var(--blue)}
.stat-label{font-size:12px;color:var(--gray-500);margin-top:2px;font-weight:500}
.stat-delta{font-size:11px;margin-top:4px;font-weight:600}
.delta-up{color:var(--green)}.delta-down{color:var(--red)}
table{width:100%;border-collapse:collapse}
thead th{background:var(--gray-50);font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--gray-500);font-weight:600;padding:8px 12px;text-align:left;border-bottom:1.5px solid var(--gray-200)}
tbody tr{border-bottom:1px solid var(--gray-100);transition:background .1s}
tbody tr:hover{background:var(--blue-light)}
tbody td{padding:9px 12px;font-size:13px;color:var(--text);vertical-align:middle}
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-blue{background:#dbeafe;color:#1e40af}.badge-green{background:#dcfce7;color:#166534}
.badge-red{background:#fee2e2;color:#991b1b}.badge-orange{background:#ffedd5;color:#9a3412}
.badge-yellow{background:#fef9c3;color:#854d0e}.badge-purple{background:#f3e8ff;color:#6b21a8}
.badge-gray{background:var(--gray-100);color:var(--gray-600)}.badge-pink{background:#fce7f3;color:#9d174d}
.p-critical::before{content:"🔴 "}.p-high::before{content:"🟠 "}
.p-medium::before{content:"🟡 "}.p-low::before{content:"🟢 "}
.s-todo{background:#f1f5f9;color:#475569}.s-inprogress{background:#dbeafe;color:#1d4ed8}
.s-review{background:#fef9c3;color:#854d0e}.s-done{background:#dcfce7;color:#166534}
.s-blocked{background:#fee2e2;color:#991b1b}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--white);border-radius:14px;box-shadow:var(--shadow-md);width:100%;max-width:620px;max-height:88vh;overflow-y:auto;padding:24px 28px;position:relative}
.modal-title{font-size:17px;font-weight:700;margin-bottom:18px;color:var(--text)}
.modal-close{position:absolute;right:18px;top:18px;background:none;border:none;font-size:20px;color:var(--gray-400);cursor:pointer}
.form-group{margin-bottom:14px}
.form-label{font-size:12px;font-weight:600;color:var(--gray-600);margin-bottom:5px;display:block}
.form-input{width:100%;padding:8px 12px;border:1.5px solid var(--gray-200);border-radius:7px;font-size:13px;color:var(--text);background:var(--white);transition:border .15s}
.form-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,86,219,.10)}
.form-select{width:100%;padding:8px 12px;border:1.5px solid var(--gray-200);border-radius:7px;font-size:13px;background:var(--white);color:var(--text)}
.form-textarea{width:100%;padding:8px 12px;border:1.5px solid var(--gray-200);border-radius:7px;font-size:13px;color:var(--text);min-height:80px;resize:vertical}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.kanban-board{display:flex;gap:16px;overflow-x:auto;padding-bottom:8px}
.kanban-col{min-width:230px;max-width:250px;flex-shrink:0}
.kanban-col-header{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--gray-200);border-radius:8px 8px 0 0;font-size:12px;font-weight:700;color:var(--gray-600)}
.kanban-col-body{background:var(--gray-100);border-radius:0 0 8px 8px;min-height:200px;padding:8px}
.kanban-card{background:var(--white);border:1.5px solid var(--gray-200);border-radius:8px;padding:11px 13px;margin-bottom:8px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow)}
.kanban-card:hover{border-color:var(--blue);box-shadow:var(--shadow-md);transform:translateY(-1px)}
.bar-chart{display:flex;gap:10px;align-items:flex-end;height:120px;padding-top:10px}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar{width:100%;background:var(--blue-light);border-radius:4px 4px 0 0;min-height:4px;cursor:pointer}
.bar:hover{background:var(--blue)}
.bar-label{font-size:10px;color:var(--gray-500);text-align:center}
.bar-val{font-size:10px;font-weight:700;color:var(--blue)}
.filter-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;border:1.5px solid var(--gray-300);font-size:12px;cursor:pointer;background:var(--white);color:var(--gray-600);transition:all .15s}
.filter-chip:hover,.filter-chip.active{border-color:var(--blue);background:var(--blue-light);color:var(--blue)}
.login-wrap{min-height:100vh;background:linear-gradient(135deg,#1a56db 0%,#1240a8 100%);display:flex;align-items:center;justify-content:center}
.login-box{background:var(--white);border-radius:16px;padding:38px 40px;width:380px;box-shadow:0 20px 60px rgba(0,0,0,.18)}
.login-logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:28px}
.login-logo-icon{width:38px;height:38px;background:var(--blue);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:800}
.login-logo-text{font-size:22px;font-weight:800;color:var(--blue);letter-spacing:-.5px}
.login-title{text-align:center;font-size:15px;color:var(--gray-500);margin-bottom:24px}
.login-input{width:100%;padding:10px 13px;border:1.5px solid var(--gray-200);border-radius:8px;font-size:14px;color:var(--text);margin-bottom:12px;transition:border .15s}
.login-input:focus{border-color:var(--blue);outline:none;box-shadow:0 0 0 3px rgba(26,86,219,.12)}
.login-btn{width:100%;padding:11px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px}
.login-btn:hover{background:var(--blue-dark)}
.login-hint{text-align:center;font-size:12px;color:var(--gray-400);margin-top:14px}
.tabs{display:flex;gap:4px;border-bottom:2px solid var(--gray-200);margin-bottom:20px}
.tab{padding:8px 16px;font-size:13px;font-weight:600;border:none;background:none;color:var(--gray-500);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab:hover{color:var(--blue)}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--gray-400);margin-bottom:12px}
.breadcrumb span{cursor:pointer}.breadcrumb span:hover{color:var(--blue)}
.bc-sep{color:var(--gray-300)}
.progress-bar{height:6px;background:var(--gray-200);border-radius:3px;overflow:hidden;margin-top:4px}
.progress-fill{height:100%;background:var(--blue);border-radius:3px;transition:width .3s}
.toggle-wrap{display:flex;align-items:center;gap:10px}
.toggle{width:38px;height:20px;background:var(--gray-300);border-radius:10px;position:relative;cursor:pointer;transition:background .2s}
.toggle.on{background:var(--blue)}
.toggle-knob{width:16px;height:16px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on .toggle-knob{left:20px}
.settings-layout{display:grid;grid-template-columns:180px 1fr;gap:20px;min-height:400px}
.settings-nav{background:var(--white);border-radius:10px;border:1.5px solid var(--gray-200);padding:10px 0;height:fit-content}
.settings-nav-item{padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer;color:var(--gray-600);border-left:3px solid transparent;transition:all .15s}
.settings-nav-item:hover{color:var(--blue);background:var(--blue-light)}
.settings-nav-item.active{color:var(--blue);border-left-color:var(--blue);background:var(--blue-light);font-weight:600}
.settings-nav-group{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--gray-400);font-weight:600;padding:12px 16px 4px}
.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:5px;font-size:11px;font-weight:600;background:var(--blue-light);color:var(--blue)}
.search-input{padding:7px 12px;border:1.5px solid var(--gray-200);border-radius:7px;font-size:13px;min-width:200px;transition:border .15s}
.search-input:focus{border-color:var(--blue);outline:none}
.empty-state{text-align:center;padding:40px 20px;color:var(--gray-400)}
.w-full{width:100%}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:3px}
.version-badge{position:fixed;bottom:14px;right:14px;background:var(--blue);color:#fff;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;z-index:9999;box-shadow:var(--shadow-md)}

/* ===================== ROADMAP STYLES ===================== */
.roadmap-wrap{width:100%;overflow-x:auto;background:var(--white);border-radius:12px;border:1.5px solid var(--gray-200);box-shadow:var(--shadow)}
.roadmap-header-row{display:flex;border-bottom:2px solid var(--gray-200);position:sticky;top:0;z-index:10;background:var(--white)}
.roadmap-left-header{width:340px;min-width:340px;padding:10px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--gray-500);border-right:2px solid var(--gray-200);background:var(--gray-50);position:sticky;left:0;z-index:12}
.roadmap-timeline-header{flex:1;display:flex;overflow:hidden;background:var(--gray-50)}
.roadmap-month{flex-shrink:0;padding:10px 0;text-align:center;font-size:11px;font-weight:700;color:var(--gray-600);border-right:1px solid var(--gray-200);position:relative}
.roadmap-body{min-width:max-content}
.roadmap-row{display:flex;border-bottom:1px solid var(--gray-100);align-items:stretch;transition:background .1s;position:relative}
.roadmap-row:hover{background:#f8faff}
.roadmap-row.expanded-parent{background:var(--gray-50)}
.roadmap-row-label{width:340px;min-width:340px;display:flex;align-items:center;gap:6px;padding:8px 12px;border-right:2px solid var(--gray-200);cursor:pointer;position:sticky;left:0;background:var(--white);z-index:2}
.roadmap-row-label:hover .row-title{color:var(--blue)}
.roadmap-row:hover .roadmap-row-label{background:#f8faff}
.roadmap-row.expanded-parent .roadmap-row-label{background:var(--gray-50)}
.expand-btn{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--gray-300);background:var(--white);display:flex;align-items:center;justify-content:center;font-size:10px;cursor:pointer;flex-shrink:0;color:var(--gray-500);transition:all .15s}
.expand-btn:hover{border-color:var(--blue);color:var(--blue)}
.row-title{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px}
.row-id{font-size:10px;color:var(--blue);font-weight:700;white-space:nowrap}
.roadmap-bar-area{flex:1;position:relative;display:flex;align-items:center;min-height:44px}
.roadmap-bar{position:absolute;height:24px;border-radius:5px;cursor:pointer;display:flex;align-items:center;padding:0 8px;font-size:11px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:filter .15s;box-shadow:0 1px 4px rgba(0,0,0,.15)}
.roadmap-bar:hover{filter:brightness(1.1);box-shadow:0 2px 8px rgba(0,0,0,.22)}
.roadmap-bar.no-dates{background:var(--gray-300)!important;color:var(--gray-600)}
.roadmap-today-line{position:absolute;top:0;bottom:0;width:2px;background:var(--red);opacity:.7;z-index:3;pointer-events:none}
.roadmap-today-line::before{content:'Today';position:absolute;top:-20px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--red);font-weight:700;white-space:nowrap}
.roadmap-grid-line{position:absolute;top:0;bottom:0;width:1px;background:var(--gray-200);pointer-events:none}
.roadmap-progress-ring{flex-shrink:0}
.roadmap-controls{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.zoom-btn{padding:5px 10px;border:1.5px solid var(--gray-300);border-radius:6px;background:var(--white);font-size:12px;color:var(--gray-600);font-weight:600;cursor:pointer;transition:all .15s}
.zoom-btn:hover,.zoom-btn.active{border-color:var(--blue);color:var(--blue);background:var(--blue-light)}
.roadmap-legend{display:flex;gap:12px;align-items:center;flex-wrap:wrap;font-size:11px;color:var(--gray-500)}
.legend-dot{width:12px;height:12px;border-radius:3px;display:inline-block;margin-right:4px}
/* depth indents */
.depth-0 .roadmap-row-label{padding-left:12px}
.depth-1 .roadmap-row-label{padding-left:28px}
.depth-2 .roadmap-row-label{padding-left:44px}
.depth-3 .roadmap-row-label{padding-left:60px}
.depth-4 .roadmap-row-label{padding-left:76px}
.depth-5 .roadmap-row-label{padding-left:92px}
/* milestone diamond */
.milestone-diamond{position:absolute;width:14px;height:14px;background:var(--purple);transform:rotate(45deg);cursor:pointer;z-index:2;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.milestone-diamond:hover{filter:brightness(1.15)}
/* backlog badge */
.backlog-badge{display:inline-flex;align-items:center;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:600;background:#f3e8ff;color:#6b21a8;border:1px solid #ddd6fe}
/* ====== SPRINT BOARD (ClickUp style) ====== */
.sprint-board{display:flex;gap:14px;overflow-x:auto;padding-bottom:12px;align-items:flex-start}
.sprint-col{min-width:240px;max-width:260px;flex-shrink:0;background:var(--gray-50);border-radius:10px;border:1.5px solid var(--gray-200)}
.sprint-col-header{display:flex;align-items:center;gap:8px;padding:10px 14px 8px;border-bottom:1.5px solid var(--gray-200)}
.sprint-col-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.sprint-col-name{font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--gray-600);text-transform:uppercase;flex:1}
.sprint-col-count{background:var(--gray-200);color:var(--gray-600);border-radius:10px;padding:1px 7px;font-size:10px;font-weight:700}
.sprint-col-body{padding:8px;min-height:180px}
.sprint-group-header{display:flex;align-items:center;gap:6px;padding:6px 8px 4px;margin-bottom:2px;cursor:pointer;border-radius:6px;transition:background .1s}
.sprint-group-header:hover{background:var(--gray-100)}
.sprint-group-chevron{font-size:10px;color:var(--gray-400);transition:transform .15s}
.sprint-card{background:var(--white);border:1.5px solid var(--gray-200);border-radius:8px;padding:10px 12px;margin-bottom:6px;cursor:pointer;transition:all .15s;border-left:3px solid transparent}
.sprint-card:hover{border-color:var(--blue);box-shadow:var(--shadow-md);transform:translateY(-1px)}
.sprint-card-title{font-size:12px;font-weight:600;color:var(--text);margin-bottom:8px;line-height:1.4}
.sprint-card-footer{display:flex;align-items:center;gap:6px}
.sprint-card-id{font-size:10px;color:var(--blue);font-weight:700}
.sprint-priority-bar{display:flex;gap:2px;align-items:center;margin-left:auto}
.sprint-priority-bar span{display:inline-block;width:14px;height:3px;border-radius:2px}
.sprint-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;padding:10px 0;border-bottom:1.5px solid var(--gray-200)}
.sprint-tab-strip{display:flex;gap:0;overflow-x:auto;border-bottom:2px solid var(--gray-200);margin-bottom:0;scrollbar-width:none}
.sprint-tab-strip::-webkit-scrollbar{display:none}
.sprint-tab{padding:8px 14px;font-size:12px;font-weight:600;color:var(--gray-500);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .15s}
.sprint-tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.sprint-tab:hover{color:var(--text)}
/* ====== WIDGET DASHBOARD ====== */
.widget-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;margin-bottom:20px}
.widget-card{border-radius:14px;padding:20px;color:#fff;position:relative;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.15);cursor:pointer;transition:transform .15s,box-shadow .15s}
.widget-card:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,.2)}
.widget-card::after{content:'';position:absolute;top:-20px;right:-20px;width:90px;height:90px;border-radius:50%;background:rgba(255,255,255,.1)}
.widget-val{font-size:32px;font-weight:800;line-height:1;margin-bottom:4px}
.widget-label{font-size:12px;font-weight:600;opacity:.85}
.widget-delta{font-size:11px;margin-top:6px;opacity:.8}
.widget-icon{position:absolute;top:16px;right:18px;font-size:28px;opacity:.35}
.widget-panel{border:2px dashed var(--gray-200);border-radius:14px;padding:20px;text-align:center;color:var(--gray-400);cursor:pointer;transition:all .15s;min-height:100px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
.widget-panel:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-light)}
.dash-section-title{font-size:18px;font-weight:800;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:8px}

// ROADMAP ENGINE

function parseDate(s){if(!s)return null;const d=new Date(s);return isNaN(d)?null:d}
function daysBetween(a,b){return Math.round((b-a)/(86400000))}
function addDays(d,n){return new Date(d.getTime()+n*86400000)}
function fmtDate(d){if(!d)return '';return d.toISOString().slice(0,10)}
function fmtMonth(d){return d.toLocaleString('default',{month:'short',year:'2-digit'})}
function fmtQuarter(d){return `Q${Math.ceil((d.getMonth()+1)/3)} '${String(d.getFullYear()).slice(2)}`}

function getRoadmapRange(tickets){
  const dates=[];
  tickets.forEach(t=>{if(t.startDate)dates.push(parseDate(t.startDate));if(t.dueDate)dates.push(parseDate(t.dueDate))});
  if(!dates.length){const now=new Date();return{start:new Date(now.getFullYear(),0,1),end:new Date(now.getFullYear(),11,31)}}
  const minD=new Date(Math.min(...dates.map(d=>d.getTime())));
  const maxD=new Date(Math.max(...dates.map(d=>d.getTime())));
  // pad by 1 month each side
  minD.setMonth(minD.getMonth()-1);maxD.setMonth(maxD.getMonth()+1);
  return{start:minD,end:maxD};
}

function getZoomConfig(){
  const z=state.roadmapZoom;
  if(z==='week')return{colWidth:120,unit:'week',label:d=>{const s=new Date(d);return s.toLocaleDateString('default',{month:'short',day:'numeric'})},advance:d=>{const n=new Date(d);n.setDate(n.getDate()+7);return n}};
  if(z==='quarter')return{colWidth:160,unit:'quarter',label:d=>fmtQuarter(d),advance:d=>{const n=new Date(d);n.setMonth(n.getMonth()+3);return n}};
  if(z==='year')return{colWidth:180,unit:'year',label:d=>String(d.getFullYear()),advance:d=>{const n=new Date(d);n.setFullYear(n.getFullYear()+1);return n}};
  // month (default)
  return{colWidth:120,unit:'month',label:d=>fmtMonth(d),advance:d=>{const n=new Date(d);n.setMonth(n.getMonth()+1);return n}};
}

function getPeriodStart(d,unit){
  const n=new Date(d);
  if(unit==='month'){n.setDate(1);n.setHours(0,0,0,0);return n}
  if(unit==='quarter'){n.setMonth(Math.floor(n.getMonth()/3)*3,1);n.setHours(0,0,0,0);return n}
  if(unit==='year'){n.setMonth(0,1);n.setHours(0,0,0,0);return n}
  // week — go to Monday
  const day=n.getDay();const diff=n.getDate()-(day===0?6:day-1);n.setDate(diff);n.setHours(0,0,0,0);return n;
}

function getPeriodDays(d,unit){
  if(unit==='month'){const e=new Date(d.getFullYear(),d.getMonth()+1,0);return daysBetween(getPeriodStart(d,'month'),e)+1}
  if(unit==='quarter')return 91;
  if(unit==='year')return 365;
  return 7; // week
}

function generateColumns(start,end,zoom){
  const {unit,advance,colWidth,label}=getZoomConfig();
  const cols=[];
  let cur=getPeriodStart(start,unit);
  while(cur<=end){
    const days=getPeriodDays(cur,unit);
    cols.push({date:new Date(cur),label:label(cur),days,width:colWidth});
    cur=advance(cur);
  }
  return cols;
}

function dateToX(date,rangeStart,cols){
  // total pixels from left to given date
  let x=0;
  const d=new Date(date);
  for(const col of cols){
    const colEnd=new Date(col.date);
    colEnd.setDate(colEnd.getDate()+col.days);
    if(d<=col.date)return x;
    if(d>=colEnd){x+=col.width;continue}
    const frac=daysBetween(col.date,d)/col.days;
    x+=frac*col.width;
    return x;
  }
  return x;
}

function totalTimelineWidth(cols){return cols.reduce((s,c)=>s+c.width,0)}

// Build flat ordered list of rows respecting expand/collapse
function buildRoadmapRows(tickets,expanded){
  // Build children map
  const childMap={};
  tickets.forEach(t=>{
    const p=t.parent;
    if(!childMap[p])childMap[p]=[];
    childMap[p].push(t);
  });
  // sort each level by startDate
  Object.keys(childMap).forEach(k=>{
    childMap[k].sort((a,b)=>{
      const da=parseDate(a.startDate),db=parseDate(b.startDate);
      if(!da&&!db)return 0;if(!da)return 1;if(!db)return -1;
      return da-db;
    });
  });

  const rows=[];
  function walk(parentId,depth){
    const children=childMap[parentId]||[];
    children.forEach(t=>{
      const hasChildren=(childMap[t.id]||[]).length>0;
      rows.push({ticket:t,depth,hasChildren});
      if(hasChildren&&expanded[t.id]!==false){
        walk(t.id,depth+1);
      }
    });
  }
  walk(null,0);
  return rows;
}

// Compute completion % from children
function computeProgress(ticketId,tickets){
  const children=tickets.filter(t=>t.parent===ticketId);
  if(!children.length){
    const t=tickets.find(x=>x.id===ticketId);
    return t&&t.status==='Done'?100:t&&t.status==='In Progress'?40:0;
  }
  const scores=children.map(c=>computeProgress(c.id,tickets));
  return Math.round(scores.reduce((s,v)=>s+v,0)/scores.length);
}

function svgProgressRing(pct,size,color){
  const r=(size-4)/2;
  const circ=2*Math.PI*r;
  const dash=circ*(pct/100);
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="flex-shrink:0">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#e2e8f8" stroke-width="3"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="3"
      stroke-dasharray="${dash} ${circ-dash}" stroke-dashoffset="${circ/4}" stroke-linecap="round"/>
    <text x="${size/2}" y="${size/2+3}" text-anchor="middle" font-size="7" font-weight="700" fill="${color}">${pct}</text>
  </svg>`;
}

function renderHierarchyRoadmap(pid,ticketsOverride){
  const tickets=ticketsOverride||getTickets(pid);
  if(!tickets.length) return '<div class="empty-state"><div style="font-size:32px;margin-bottom:8px">📅</div><div>No tickets with dates yet. Create tickets and set start/due dates to see the roadmap.</div></div>';

  const {start:rangeStart,end:rangeEnd}=getRoadmapRange(tickets);
  const zoom=getZoomConfig();
  const cols=generateColumns(rangeStart,rangeEnd,zoom);
  const totalW=totalTimelineWidth(cols);
  const today=new Date();
  const todayX=dateToX(today,rangeStart,cols);

  // Initialize expansion: default all top-level and L1 expanded
  const expanded={...state.roadmapExpanded};
  tickets.forEach(t=>{
    if(expanded[t.id]===undefined){
      const depth=TYPE_DEPTH[t.type]||0;
      expanded[t.id]=depth<=1;
    }
  });

  const rows=buildRoadmapRows(tickets,expanded);

  // Header months
  const monthHeaders=cols.map(col=>`<div class="roadmap-month" style="width:${col.width}px;min-width:${col.width}px">${col.label}</div>`).join('');

  // Grid lines
  let gridLines='';
  let gx=0;
  cols.forEach(col=>{gridLines+=`<div class="roadmap-grid-line" style="left:${gx}px"></div>`;gx+=col.width});
  // Today line
  const todayLine=todayX>=0&&todayX<=totalW?`<div class="roadmap-today-line" style="left:${todayX}px"><span style="position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--red);font-weight:700;white-space:nowrap">Today</span></div>`:'';

  // Rows
  const rowsHtml=rows.map(({ticket:t,depth,hasChildren})=>{
    const color=TYPE_COLORS[t.type]||'#1a56db';
    const progress=computeProgress(t.id,tickets);
    const isExp=expanded[t.id]!==false;
    const sd=parseDate(t.startDate),ed=parseDate(t.dueDate);
    const hasDates=sd&&ed;

    // Bar geometry
    let barHtml='';
    if(hasDates){
      const x1=dateToX(sd,rangeStart,cols);
      const x2=dateToX(ed,rangeStart,cols);
      const bw=Math.max(x2-x1,20);
      // progress fill inside bar
      const fillW=Math.round(bw*(progress/100));
      barHtml=`<div class="roadmap-bar" onclick="viewTicket('${t.id}')" style="left:${x1}px;width:${bw}px;background:${color};opacity:0.92"
        title="${t.id}: ${t.title} | ${t.startDate} → ${t.dueDate} | ${progress}% done">
        <div style="position:absolute;left:0;top:0;height:100%;width:${fillW}px;background:rgba(255,255,255,0.25);border-radius:5px;pointer-events:none"></div>
        <span style="position:relative;z-index:1;font-size:11px;font-weight:600;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.3)">${t.id}</span>
      </div>`;
    } else {
      // No dates — show diamond placeholder at left edge
      barHtml=`<div style="position:absolute;left:12px;display:flex;align-items:center;gap:6px;color:var(--gray-400);font-size:11px">
        <div style="width:10px;height:10px;background:var(--gray-300);transform:rotate(45deg)"></div>
        <span>No dates set</span>
      </div>`;
    }

    const expandBtn=hasChildren
      ?`<button class="expand-btn" onclick="event.stopPropagation();toggleRoadmapRow('${t.id}')">${isExp?'▾':'▸'}</button>`
      :`<span style="width:18px;flex-shrink:0"></span>`;

    return `<div class="roadmap-row depth-${depth}" style="min-height:44px">
      <div class="roadmap-row-label" onclick="viewTicket('${t.id}')">
        ${expandBtn}
        ${svgProgressRing(progress,28,color)}
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:5px">
            <span class="badge ${getTypeColor(t.type)}" style="font-size:9px;padding:1px 5px">${t.type}</span>
            <span class="row-id">${t.id}</span>
          </div>
          <div class="row-title" title="${t.title}">${t.title}</div>
          <div style="font-size:10px;color:var(--gray-400)">${hasDates?t.startDate+' → '+t.dueDate:'<span class="backlog-badge">Backlog</span>'}</div>
        </div>
        ${avatarEl(t.assignee,20)}
      </div>
      <div class="roadmap-bar-area" style="width:${totalW}px;min-width:${totalW}px;position:relative">
        ${gridLines}
        ${todayLine}
        ${barHtml}
      </div>
    </div>`;
  }).join('');

  return `
  <div class="roadmap-controls">
    <span style="font-size:12px;font-weight:600;color:var(--gray-600)">Zoom:</span>
    ${['week','month','quarter','year'].map(z=>`<button class="zoom-btn ${state.roadmapZoom===z?'active':''}" onclick="setState({roadmapZoom:'${z}'})">${z.charAt(0).toUpperCase()+z.slice(1)}</button>`).join('')}
    <div style="margin-left:12px" class="roadmap-legend">
      ${Object.entries(TYPE_COLORS).map(([t,c])=>`<span><span class="legend-dot" style="background:${c}"></span>${t}</span>`).join('')}
    </div>
    <button class="btn btn-ghost btn-sm" style="margin-left:auto" onclick="expandAllRoadmap()">Expand All</button>
    <button class="btn btn-ghost btn-sm" onclick="collapseAllRoadmap()">Collapse All</button>
  </div>
  <div class="roadmap-wrap">
    <div class="roadmap-header-row">
      <div class="roadmap-left-header">Issue / Timeline</div>
      <div class="roadmap-timeline-header">${monthHeaders}</div>
    </div>
    <div class="roadmap-body">
      ${rowsHtml||'<div class="empty-state">No tickets found</div>'}
    </div>
  </div>`;
}

function toggleRoadmapRow(id){
  const exp={...state.roadmapExpanded};
  exp[id]=exp[id]===false?true:false;
  setState({roadmapExpanded:exp});
}
function expandAllRoadmap(){
  const exp={};
  state.tickets.forEach(t=>exp[t.id]=true);
  setState({roadmapExpanded:exp});
}
function collapseAllRoadmap(){
  const exp={};
  state.tickets.forEach(t=>exp[t.id]=false);
  setState({roadmapExpanded:exp});
}

// ---- BOARD VIEW (ClickUp-style sprint board) ----
const COL_COLORS={'To Do':'#64748b','In Progress':'#1d4ed8','In Review':'#7c3aed','Done':'#16a34a','Blocked':'#dc2626'};
const PRIORITY_COLORS={'Critical':'#dc2626','High':'#ea580c','Medium':'#ca8a04','Low':'#16a34a'};
function priorityBar(p){const c=PRIORITY_COLORS[p]||'#94a3b8';return `<div class="sprint-priority-bar" title="${p}"><span style="background:${c}"></span><span style="background:${c}"></span><span style="background:${c}"></span></div>`;}
function renderBoardView(pid){
  const tks=getTickets(pid);
  const sprints=[...new Set(tks.map(t=>t.sprint).filter(Boolean))];
  const activeSprint=state.activeSprint||(sprints.length?sprints[sprints.length-1]:null);
  const sprintTks=activeSprint?tks.filter(t=>t.sprint===activeSprint):tks;
  const allAssignees=[...new Set(tks.map(t=>t.assignee).filter(Boolean))];
  const boardFilter=state.boardAssigneeFilter||[];
  const filteredTks=boardFilter.length?sprintTks.filter(t=>boardFilter.includes(t.assignee)):sprintTks;
  // Group by parent
  const parents=filteredTks.filter(t=>!t.parent);
  const orphans=filteredTks.filter(t=>t.parent&&!filteredTks.find(x=>x.id===t.parent));
  const allGroups=[...parents,...orphans].length?[...new Set([...parents.map(t=>t.id),...orphans.map(t=>t.parent||t.id)])]:[];
  function renderSprintCol(status){
    const cards=filteredTks.filter(t=>t.status===status);
    const col=COL_COLORS[status]||'#94a3b8';
    // group cards by parent
    const grouped={};
    cards.forEach(t=>{const key=t.parent||('__'+t.id);if(!grouped[key])grouped[key]=[];grouped[key].push(t);});
    const colHtml=Object.entries(grouped).map(([key,items])=>{
      const parentT=items[0].parent?tks.find(x=>x.id===items[0].parent):null;
      const groupHeader=parentT?`<div class="sprint-group-header">
        <span style="font-size:10px;color:var(--gray-400)">▾</span>
        <span style="color:#16a34a;font-size:14px">🔖</span>
        <span style="font-size:11px;font-weight:700;color:var(--blue)">${parentT.id}</span>
        <span style="font-size:11px;color:var(--gray-600);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${parentT.title}</span>
        <span style="font-size:10px;background:var(--gray-200);border-radius:8px;padding:1px 6px;color:var(--gray-500)">${items.length} subtask${items.length>1?'s':''}</span>
        <span class="badge ${getStatusClass(parentT.status)}" style="font-size:9px">${parentT.status.toUpperCase()}</span>
      </div>`:'';
      return groupHeader+items.map(t=>`<div class="sprint-card" style="border-left-color:${COL_COLORS[t.status]||'transparent'}" onclick="viewTicket('${t.id}')">
        <div class="sprint-card-title">${t.title}</div>
        <div class="sprint-card-footer">
          <span class="sprint-card-id">${t.id}</span>
          <span class="badge ${getTypeColor(t.type)}" style="font-size:9px;padding:1px 5px">${t.type}</span>
          ${priorityBar(t.priority)}
          ${avatarEl(t.assignee,22)}
        </div>
      </div>`).join('');
    }).join('');
    return `<div class="sprint-col">
      <div class="sprint-col-header">
        <span class="sprint-col-dot" style="background:${col}"></span>
        <span class="sprint-col-name">${status}</span>
        <span class="sprint-col-count">${cards.length}</span>
      </div>
      <div class="sprint-col-body">

      <div class="filter-chip-wrap" style="font-size:12px">

      </div>

        <button class="filter-chip" style="font-size:12px">Quick filters ▾</button>
      </div>
      <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
        ${sprints.length?`<select class="form-select" style="font-size:12px;padding:4px 10px;height:auto;width:auto" onchange="setState({activeSprint:this.value})">

}
function toggleBoardAssignee(a){const cur=state.boardAssigneeFilter||[];setState({boardAssigneeFilter:cur.includes(a)?cur.filter(x=>x!==a):[...cur,a]});}
function setBoardType(pid,type){setState({projectBoards:{...state.projectBoards,[pid]:type}});}

// ---- KANBAN ----
function renderKanban(pid){
  const tks=getTickets(pid);
  return `<div class="kanban-board">
    ${STATUSES.map(status=>{
      const cards=tks.filter(t=>t.status===status);
      return `<div class="kanban-col">
        <div class="kanban-col-header">${status}<span style="background:var(--gray-400);color:#fff;border-radius:10px;padding:1px 7px;font-size:10px">${cards.length}</span></div>
        <div class="kanban-col-body">
          ${cards.map(t=>`<div class="kanban-card" onclick="viewTicket('${t.id}')">
            <div style="display:flex;align-items:center;justify-content:space-between">
              <span style="font-size:10px;color:var(--gray-400);font-weight:600">${t.id}</span>
              <span class="badge ${getTypeColor(t.type)}" style="font-size:10px">${t.type}</span>
            </div>
            <div style="font-size:12px;font-weight:600;color:var(--text);margin:4px 0">${t.title}</div>
            <div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px">
              <span style="font-size:11px" class="${priorityClass(t.priority)}">${t.priority}</span>
              ${avatarEl(t.assignee,22)}
            </div>
          </div>`).join('')}
          <div style="text-align:center;padding:8px;font-size:11px;color:var(--gray-400);cursor:pointer" onclick="openModal('createTicket',{status:'${status}'})">+ Add</div>
        </div>
      </div>`;
    }).join('')}
  </div>`;

// ---- BACKLOG (tickets go here after creation) ----
function renderBacklog(pid){
  const tks=getTickets(pid);
  const backlog=tks.filter(t=>t.status==='To Do');
  const inProgress=tks.filter(t=>t.status==='In Progress'||t.status==='In Review');
  const done=tks.filter(t=>t.status==='Done');
  const blocked=tks.filter(t=>t.status==='Blocked');

  function ticketRows(list,label,labelClass){
    if(!list.length)return'';
    return `<tr><td colspan="8" style="padding:6px 14px;background:var(--gray-50);font-size:11px;font-weight:700;color:var(--gray-500);text-transform:uppercase;letter-spacing:.5px;border-top:2px solid var(--gray-200)">
      <span class="badge ${labelClass}" style="margin-right:6px">${label}</span>${list.length} issues
    </td></tr>`
    +list.map(t=>`<tr onclick="viewTicket('${t.id}')" style="cursor:pointer">
      <td style="font-weight:600;color:var(--blue);padding-left:20px">${t.id}</td>
      <td><span class="badge ${getTypeColor(t.type)}">${t.type}</span></td>
      <td style="max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500">${t.title}</td>
      <td><span class="badge ${getStatusClass(t.status)}">${t.status}</span></td>
      <td><span style="font-size:12px" class="${priorityClass(t.priority)}">${t.priority}</span></td>
      <td>${avatarEl(t.assignee,24)}</td>
      <td style="font-size:11px;color:var(--gray-400)">${t.sprint||'—'}</td>
      <td style="font-size:11px;color:var(--gray-400)">${t.dueDate||'—'}</td>
    </tr>`).join('');
  }

  return `<div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap">
      <span style="font-size:13px;color:var(--gray-500)">All issues in this project grouped by status</span>
      <button class="btn btn-primary btn-sm" style="margin-left:auto" onclick="openModal('createTicket')">+ Create Issue</button>
    </div>
    <div class="card" style="padding:0">
      <table>
        <thead><tr><th>ID</th><th>Type</th><th>Summary</th><th>Status</th><th>Priority</th><th>Assignee</th><th>Sprint</th><th>Due Date</th></tr></thead>
        <tbody>
          ${ticketRows(backlog,'To Do','s-todo')}
          ${ticketRows(inProgress,'In Progress / Review','s-inprogress')}
          ${ticketRows(blocked,'Blocked','s-blocked')}
          ${ticketRows(done,'Done','s-done')}
          ${!tks.length?'<tr><td colspan="8"><div class="empty-state"><div style="font-size:28px;margin-bottom:8px">📋</div><div>No issues yet. Click + Create Issue to start.</div></div></td></tr>':''}
        </tbody>
      </table>
    </div>
  </div>`;
}

// ---- PROJECT REPORTS ----
function renderProjectReports(pid){
  const tks=getTickets(pid);
  const byStatus={};STATUSES.forEach(s=>byStatus[s]=tks.filter(t=>t.status===s).length);
  const mx=Math.max(...Object.values(byStatus),1);
  const byAssignee={};tks.forEach(t=>{if(!byAssignee[t.assignee])byAssignee[t.assignee]=0;byAssignee[t.assignee]++});
  return `<div class="grid-2">
    <div class="card"><div class="card-title">Tickets by Status</div>
      <div class="bar-chart">${STATUSES.map(s=>`<div class="bar-wrap"><div class="bar-val">${byStatus[s]}</div><div class="bar" style="height:${Math.round(byStatus[s]/mx*80)+10}px;background:${s==='Done'?'var(--green)':s==='Blocked'?'var(--red)':'var(--blue)'}"></div><div class="bar-label">${s.split(' ')[0]}</div></div>`).join('')}</div>
    </div>
    <div class="card"><div class="card-title">Team Workload</div>
      ${Object.entries(byAssignee).map(([name,count])=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">${avatarEl(name,26)}<div style="flex:1"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px"><span>${name}</span><span style="font-weight:700">${count}</span></div><div class="progress-bar"><div class="progress-fill" style="width:${Math.round(count/tks.length*100)}%"></div></div></div></div>`).join('')}
    </div>
    <div class="card"><div class="card-title">By Issue Type</div>
      ${ISSUE_TYPES.map(t=>{const c=tks.filter(x=>x.type===t).length;return c?`<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--gray-100)"><span class="badge ${getTypeColor(t)}">${t}</span><strong>${c}</strong></div>`:''}).join('')}
    </div>
    <div class="card"><div class="card-title">By Priority</div>
      ${PRIORITIES.map(p=>{const c=tks.filter(t=>t.priority===p).length;return `<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--gray-100)"><span style="font-size:13px" class="${priorityClass(p)}">${p}</span><strong>${c}</strong></div>`}).join('')}
    </div>
  </div>`;
}

        <div class="widget-icon">✅</div>

        <div class="widget-delta">↑ ${doneP}% completion rate</div>

        <div class="widget-delta">${total?Math.round(inprog/total*100):0}% of all issues</div>

        <div class="widget-delta">${blocked>0?'⚠ Needs attention':'All clear'}</div>
      </div>

        <div class="widget-icon">📥</div>
        <div class="widget-val">${todo}</div>
        <div class="widget-label">To Do</div>
        <div class="widget-delta">Waiting to start</div>
      </div>
      <div class="widget-card" style="background:linear-gradient(135deg,#0891b2,#06b6d4)">
        <div class="widget-icon">👥</div>
        <div class="widget-val">${Object.keys(byAssignee).length}</div>
        <div class="widget-label">Team Members</div>
        <div class="widget-delta">Active contributors</div>
      </div>
    </div>
    <div class="grid-2" style="margin-bottom:20px">

          <div style="height:8px;border-radius:4px;overflow:hidden;display:flex;width:120px">
            ${STATUSES.map(s=>{const c=byStatus[s];const color=s==='Done'?'#22c55e':s==='Blocked'?'#ef4444':s==='In Progress'?'#3b82f6':s==='In Review'?'#a855f7':'#94a3b8';return c?`<div style="flex:${c};background:${color};height:100%" title="${s}: ${c}"></div>`:''}).join('')}
          </div>
        </div>
        <div class="bar-chart" style="height:130px">${STATUSES.map(s=>{const c=byStatus[s];const color=s==='Done'?'#22c55e':s==='Blocked'?'#ef4444':s==='In Progress'?'#3b82f6':s==='In Review'?'#a855f7':'#94a3b8';return`<div class="bar-wrap"><div class="bar-val">${c}</div><div class="bar" style="height:${Math.round(c/mx*90)+10}px;background:${color};border-radius:4px 4px 0 0"></div><div class="bar-label" style="font-size:9px">${s.split(' ')[0]}</div></div>`}).join('')}</div>

const REPORT_LABELS={'issue-list':'📋 Issue List','pie-status':'🥧 By Status','pie-priority':'🥧 By Priority','pie-type':'🥧 By Issue Type','burndown':'📉 Burndown','velocity':'⚡ Velocity','workload':'👥 Team Workload','created-resolved':'📊 Created vs Resolved'};
function renderCustomDashboards(){
  if(!state.customDashboards.length)return`<div class="empty-state" style="padding:60px"><div style="font-size:40px;margin-bottom:12px">📊</div><div style="font-size:16px;font-weight:700;margin-bottom:6px">No dashboards yet</div><div style="font-size:13px;color:var(--gray-400);margin-bottom:16px">Create a dashboard from a saved filter to track your metrics</div><button class="btn btn-primary" onclick="openModal('createDashboard')">+ Create Dashboard</button></div>`;
  const DASH_GRADIENTS=['linear-gradient(135deg,#1d4ed8,#3b82f6)','linear-gradient(135deg,#7c3aed,#a855f7)','linear-gradient(135deg,#15803d,#22c55e)','linear-gradient(135deg,#d97706,#f59e0b)','linear-gradient(135deg,#0891b2,#06b6d4)','linear-gradient(135deg,#be185d,#ec4899)'];
  const cards=state.customDashboards.map((d,i)=>{
    const f=state.filters.find(x=>x.id===d.filterId);
    const res=f?getFilteredTickets(d.filterId):state.tickets;
    const done=res.filter(t=>t.status==='Done').length;
    const inprog=res.filter(t=>t.status==='In Progress').length;
    const blocked=res.filter(t=>t.status==='Blocked').length;
    const grad=DASH_GRADIENTS[i%DASH_GRADIENTS.length];
    return `<div class="card" style="padding:0;overflow:hidden">
      <div style="background:${grad};padding:18px 20px;position:relative;overflow:hidden">
        <div style="position:absolute;top:-15px;right:-15px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.1)"></div>
        <div style="display:flex;align-items:flex-start;justify-content:space-between">
          <div>
            <div style="font-size:16px;font-weight:800;color:#fff;margin-bottom:2px">${d.name}</div>
            <div style="font-size:11px;color:rgba(255,255,255,.75)">Filter: ${f?f.name:'—'} · ${REPORT_LABELS[d.reportType||'issue-list']}</div>
          </div>
          <div style="display:flex;gap:4px">
            <button class="btn btn-sm" style="background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.3);font-size:11px" onclick="openModal('editDashboard',${d.id})">✏ Edit</button>
            <button class="btn btn-sm" style="background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2);font-size:11px" onclick="deleteCustomDashboard(${d.id})">🗑</button>
          </div>
        </div>
        <div style="display:flex;gap:16px;margin-top:14px">
          <div style="text-align:center"><div style="font-size:22px;font-weight:800;color:#fff">${res.length}</div><div style="font-size:10px;color:rgba(255,255,255,.7)">Total</div></div>
          <div style="text-align:center"><div style="font-size:22px;font-weight:800;color:#fff">${done}</div><div style="font-size:10px;color:rgba(255,255,255,.7)">Done</div></div>
          <div style="text-align:center"><div style="font-size:22px;font-weight:800;color:#fff">${inprog}</div><div style="font-size:10px;color:rgba(255,255,255,.7)">In Progress</div></div>
          <div style="text-align:center"><div style="font-size:22px;font-weight:800;color:#fff">${blocked}</div><div style="font-size:10px;color:rgba(255,255,255,.7)">Blocked</div></div>
        </div>
      </div>
      <div style="padding:16px">
        ${renderDashboardReport(d,res)}
      </div>
    </div>`;
  }).join('');
  return `<div><div class="dash-section-title">📋 My Dashboards</div><div class="grid-2">${cards}</div></div>`;
}
function renderSegChart(segs,total){
  const bar=segs.map(s=>`<div style="flex:${s.value};background:${s.color};height:100%" title="${s.label}: ${s.value}"></div>`).join('');
  const legend=segs.map(s=>`<div style="display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid var(--gray-100)"><span style="width:10px;height:10px;border-radius:2px;background:${s.color};flex-shrink:0"></span><span style="font-size:12px;flex:1">${s.label}</span><span style="font-size:12px;font-weight:700">${s.value}</span><span style="font-size:11px;color:var(--gray-400);min-width:38px;text-align:right">${Math.round(s.value/total*100)}%</span></div>`).join('');
  return `<div style="height:16px;border-radius:6px;overflow:hidden;display:flex;margin-bottom:10px">${bar}</div><div>${legend}</div>`;
}
function renderDashboardReport(d,res){
  const rt=d.reportType||'issue-list';
  const SC={'To Do':'#94a3b8','In Progress':'#1a56db','In Review':'#ca8a04','Done':'#16a34a','Blocked':'#dc2626'};
  const PC={'Critical':'#dc2626','High':'#ea580c','Medium':'#ca8a04','Low':'#16a34a'};
  const TC={'Feature':'#1a56db','Initiative':'#7c3aed','Epic':'#9333ea','Story':'#16a34a','Task':'#ca8a04','Sub-task':'#ea580c'};
  if(rt==='issue-list'){
    const rows=res.slice(0,5).map(t=>`<tr onclick="viewTicket('${t.id}')" style="cursor:pointer"><td style="font-weight:600;color:var(--blue)">${t.id}</td><td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.title}</td><td><span class="badge ${getStatusClass(t.status)}">${t.status}</span></td><td>${avatarEl(t.assignee,22)}</td></tr>`).join('');
    const more=res.length>5?`<tr><td colspan="4" style="text-align:center;font-size:11px;color:var(--gray-400);padding:7px">+${res.length-5} more</td></tr>`:'';
    return `<div class="card" style="padding:0;margin:0"><table><thead><tr><th>ID</th><th>Title</th><th>Status</th><th>Assignee</th></tr></thead><tbody>${rows}${more}</tbody></table></div>`;
  }
  if(rt==='pie-status'){const segs=STATUSES.map(s=>({label:s,value:res.filter(t=>t.status===s).length,color:SC[s]})).filter(s=>s.value>0);return res.length?renderSegChart(segs,res.length):'<div class="empty-state" style="padding:12px">No data</div>';}
  if(rt==='pie-priority'){const segs=PRIORITIES.map(p=>({label:p,value:res.filter(t=>t.priority===p).length,color:PC[p]})).filter(s=>s.value>0);return res.length?renderSegChart(segs,res.length):'<div class="empty-state" style="padding:12px">No data</div>';}
  if(rt==='pie-type'){const segs=ISSUE_TYPES.map(t=>({label:t,value:res.filter(x=>x.type===t).length,color:TC[t]})).filter(s=>s.value>0);return res.length?renderSegChart(segs,res.length):'<div class="empty-state" style="padding:12px">No data</div>';}
  if(rt==='burndown'){const mx=Math.max(...STATUSES.map(s=>res.filter(t=>t.status===s).length),1);return `<div class="bar-chart" style="height:90px">${STATUSES.map(s=>{const c=res.filter(t=>t.status===s).length;return `<div class="bar-wrap"><div class="bar-val">${c}</div><div class="bar" style="height:${Math.round(c/mx*70)+5}px;background:${SC[s]}"></div><div class="bar-label" style="font-size:9px">${s.split(' ')[0]}</div></div>`}).join('')}</div>`;}
  if(rt==='velocity'){const sprints=['Sprint 1','Sprint 2','Sprint 3'];const mx=Math.max(...sprints.map(s=>res.filter(t=>t.sprint===s&&t.status==='Done').length),1);return `<div style="font-size:11px;color:var(--gray-500);margin-bottom:6px">Completed tickets per sprint</div><div class="bar-chart" style="height:90px">${sprints.map(s=>{const c=res.filter(t=>t.sprint===s&&t.status==='Done').length;return `<div class="bar-wrap"><div class="bar-val">${c}</div><div class="bar" style="height:${Math.round(c/mx*70)+5}px;background:var(--green)"></div><div class="bar-label" style="font-size:9px">${s}</div></div>`}).join('')}</div>`;}
  if(rt==='workload'){const by={};res.forEach(t=>{if(!by[t.assignee])by[t.assignee]=0;by[t.assignee]++});const mx=Math.max(...Object.values(by),1);return Object.entries(by).slice(0,5).map(([name,count])=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">${avatarEl(name,24)}<div style="flex:1"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px"><span>${name}</span><strong>${count}</strong></div><div class="progress-bar"><div class="progress-fill" style="width:${Math.round(count/mx*100)}%"></div></div></div></div>`).join('');}
  if(rt==='created-resolved'){const total=res.length,done=res.filter(t=>t.status==='Done').length,open=total-done;return `<div><div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px"><span>Total Created</span><strong>${total}</strong></div><div class="progress-bar" style="height:10px"><div class="progress-fill" style="width:100%;background:var(--blue)"></div></div></div><div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px"><span>Resolved (Done)</span><strong>${done}</strong></div><div class="progress-bar" style="height:10px"><div class="progress-fill" style="width:${total?Math.round(done/total*100):0}%;background:var(--green)"></div></div></div><div><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px"><span>Still Open</span><strong>${open}</strong></div><div class="progress-bar" style="height:10px"><div class="progress-fill" style="width:${total?Math.round(open/total*100):0}%;background:var(--orange)"></div></div></div></div>`;}
  return '';
}

// ---- FILTER HELPERS ----
function toggleFilterDropdown(name){setState({filterDropdownOpen:state.filterDropdownOpen===name?null:name});}
function toggleFilterArr(key,val){const cur=state[key]||[];setState({[key]:cur.includes(val)?cur.filter(x=>x!==val):[...cur,val]});}
function toggleProjectFilter(id){const cur=state.projectFilter||[];setState({projectFilter:cur.includes(id)?cur.filter(x=>x!==id):[...cur,id]});}
function clearAllFilters(){setState({ticketSearch:'',typeFilter:[],statusFilter:[],projectFilter:[],assigneeFilter:[],priorityFilter:[],sprintFilter:[],filterDropdownOpen:null,jqlQuery:''});}
function loadFilterToSearch(fid){
  const f=state.filters.find(x=>x.id===fid);if(!f)return;
  const c=f.conditions;
  if(c.jql){setState({filterTab:'search',jqlMode:true,jqlQuery:c.jql});}
  else{setState({filterTab:'search',jqlMode:false,ticketSearch:c.text||'',typeFilter:Array.isArray(c.type)?c.type:(c.type?[c.type]:[]),statusFilter:Array.isArray(c.status)?c.status:(c.status?[c.status]:[]),projectFilter:Array.isArray(c.project)?c.project:(c.project?[c.project]:[]),assigneeFilter:c.assignee?[c.assignee]:[],priorityFilter:c.priority?[c.priority]:[],sprintFilter:c.sprint?[c.sprint]:[]});}
}

// ---- JQL PARSER ----
function parseJQL(jql){
  if(!jql||!jql.trim())return[];
  const parts=jql.trim().split(/\s+AND\s+/i);
  const conds=[];
  for(let p of parts){
    p=p.trim();
    let m=p.match(/^(\w+)\s+IN\s*\(([^)]+)\)$/i);
    if(m){const field=m[1].toLowerCase();const vals=m[2].split(',').map(v=>v.trim().replace(/^["']|["']$/g,''));conds.push({field,op:'in',vals});continue;}
    m=p.match(/^(\w+)\s*(=|!=|~)\s*["']?(.+?)["']?$/i);
    if(m){conds.push({field:m[1].toLowerCase(),op:m[2],val:m[3].trim().replace(/^["']|["']$/g,'')});continue;}
  }
  return conds;
}
function applyJQL(tickets,jql){
  const conds=parseJQL(jql);
  if(!conds.length)return tickets;
  return tickets.filter(t=>conds.every(c=>{
    let tv='';
    if(c.field==='project'){const p=state.projects.find(x=>x.id===t.project);tv=p?p.key.toLowerCase():String(t.project);}
    else if(c.field==='status')tv=(t.status||'').toLowerCase();
    else if(c.field==='priority')tv=(t.priority||'').toLowerCase();
    else if(c.field==='assignee')tv=(t.assignee||'').toLowerCase();
    else if(c.field==='issuetype'||c.field==='type')tv=(t.type||'').toLowerCase();
    else if(c.field==='sprint')tv=(t.sprint||'').toLowerCase();
    else if(c.field==='labels')tv=(t.labels||[]).join(',').toLowerCase();
    else if(c.field==='text'||c.field==='summary')tv=((t.title||'')+(t.desc||'')).toLowerCase();
    else if(c.field==='id')tv=(t.id||'').toLowerCase();
    const v=c.val?c.val.toLowerCase():'';
    if(c.op==='in')return c.vals.some(vv=>tv===vv.toLowerCase()||tv.includes(vv.toLowerCase()));
    if(c.op==='~')return tv.includes(v);
    if(c.op==='=')return tv===v;
    if(c.op==='!=')return tv!==v;
    return true;
  }));
}

function renderModal(){
  const m=state.modal;if(!m)return'';
  let inner='';
  if(m.type==='createTicket')inner=renderCTModal(m.data,m.extra);
  else if(m.type==='editTicket')inner=renderETModal(m.data);
  else if(m.type==='createProject')inner=renderCPModal();
  else if(m.type==='saveFilter')inner=renderSFModal();
  else if(m.type==='createDashboard')inner=renderCDModal(m.data);
  else if(m.type==='editDashboard')inner=renderEDModal(m.data);
  else if(m.type==='addUser')inner=renderAUModal();
  else if(m.type==='editUser')inner=renderEUModal(m.data);
  else if(m.type==='addField')inner=renderAFModal();
  else if(m.type==='notifications')inner=renderNotifsModal();
  else if(m.type==='addGroup')inner=rSimple('Add Group','Group Name','addGroup');
  else if(m.type==='addRole')inner=rSimple('Add Role','Role Name','addRole');
  else inner=`<div class="modal-title">Coming Soon</div>`;
  return `<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal">${inner}</div></div>`;
}

      <div class="form-group"><label class="form-label">Assignee</label>

function subCT(){
  const pid=parseInt(document.getElementById('ct-project').value);
  const type=document.getElementById('ct-type').value;
  const title=document.getElementById('ct-title').value.trim();
  if(!title){alert('Title required');return}
  const desc=document.getElementById('ct-desc').value;
  const priority=document.getElementById('ct-priority').value;
  const assignee=document.getElementById('ct-assignee').value;
  const parent=document.getElementById('ct-parent').value||null;
  const sprint=document.getElementById('ct-sprint').value;
  const startDate=document.getElementById('ct-start').value||null;
  const dueDate=document.getElementById('ct-due').value||null;
  const labels=document.getElementById('ct-labels').value.split(',').map(s=>s.trim()).filter(Boolean);
  const p=projectById(pid);
  const num=state.nextTicketNums[pid]||1;
  const id=`${p.key}-${num}`;
  state.nextTicketNums[pid]=num+1;
  const today=new Date().toISOString().slice(0,10);
  // STATUS IS ALWAYS 'To Do' — goes to backlog
  const t={id,project:pid,type,title,desc,status:'To Do',priority,assignee,reporter:state.user.name,created:today,updated:today,labels,sprint,parent,startDate,dueDate};
  setState({tickets:[...state.tickets,t],modal:null,activeProject:pid,page:'projectdetail',projectTab:'issues'});
}

    </div></div>`;
}
function subED(id){const sel=document.querySelector('input[name="ed-report"]:checked');if(!sel)return;setState({customDashboards:state.customDashboards.map(d=>d.id===id?{...d,reportType:sel.value}:d),modal:null});}

function renderAUModal(){return `<div>
  <div class="modal-title">Add User</div><button class="modal-close" onclick="closeModal()">×</button>
  <div class="form-row"><div class="form-group"><label class="form-label">First Name *</label><input class="form-input" id="au-fn" placeholder="John"/></div><div class="form-group"><label class="form-label">Last Name</label><input class="form-input" id="au-ln" placeholder="Doe"/></div></div>
  <div class="form-group"><label class="form-label">Email *</label><input class="form-input" id="au-em" type="email" placeholder="john@company.com"/></div>
  <div class="form-row"><div class="form-group"><label class="form-label">Role</label><select class="form-select" id="au-role">${state.roles.map(r=>`<option value="${r}">${r}</option>`).join('')}</select></div><div class="form-group"><label class="form-label">Group</label><select class="form-select" id="au-group">${state.groups.map(g=>`<option value="${g}">${g}</option>`).join('')}</select></div></div>
  <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="subAU()">Add User</button></div></div>`}
function subAU(){const fn=document.getElementById('au-fn').value.trim(),em=document.getElementById('au-em').value.trim();if(!fn||!em){alert('Name+email required');return}const name=fn+' '+(document.getElementById('au-ln').value.trim());setState({users:[...state.users,{id:state.users.length+1,name,email:em,role:document.getElementById('au-role').value,group:document.getElementById('au-group').value,active:true}],modal:null})}

function renderEUModal(uid){const u=state.users.find(x=>x.id===uid);if(!u)return'<div>Not found</div>';return `<div>
  <div class="modal-title">Edit User</div><button class="modal-close" onclick="closeModal()">×</button>
  <div class="form-group"><label class="form-label">Name</label><input class="form-input" id="eu-name" value="${u.name}"/></div>
  <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="eu-email" value="${u.email}"/></div>
  <div class="form-row"><div class="form-group"><label class="form-label">Role</label><select class="form-select" id="eu-role">${state.roles.map(r=>`<option value="${r}" ${u.role===r?'selected':''}>${r}</option>`).join('')}</select></div><div class="form-group"><label class="form-label">Group</label><select class="form-select" id="eu-group">${state.groups.map(g=>`<option value="${g}" ${u.group===g?'selected':''}>${g}</option>`).join('')}</select></div></div>
  <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="subEU(${uid})">Save</button></div></div>`}
function subEU(id){const u=state.users.find(x=>x.id===id);if(u){u.name=document.getElementById('eu-name').value;u.email=document.getElementById('eu-email').value;u.role=document.getElementById('eu-role').value;u.group=document.getElementById('eu-group').value;setState({modal:null})}}

function renderAFModal(){return `<div>
  <div class="modal-title">Add Custom Field</div><button class="modal-close" onclick="closeModal()">×</button>
  <div class="form-group"><label class="form-label">Name *</label><input class="form-input" id="af-name" placeholder="e.g. Customer Impact"/></div>
  <div class="form-row"><div class="form-group"><label class="form-label">Type</label><select class="form-select" id="af-type"><option>Text</option><option>Number</option><option>Date</option><option>Select</option><option>Checkbox</option></select></div><div class="form-group"><label class="form-label">Required</label><select class="form-select" id="af-req"><option value="false">Optional</option><option value="true">Required</option></select></div></div>
  <div class="form-group"><label class="form-label">Apply to</label><div style="display:flex;flex-wrap:wrap;gap:6px;padding:6px 0">${ISSUE_TYPES.map(t=>`<label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer"><input type="checkbox" id="af-it-${t.replace('-','')}" checked/>${t}</label>`).join('')}</div></div>
  <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="subAF()">Add Field</button></div></div>`}
function subAF(){const name=document.getElementById('af-name').value.trim();if(!name){alert('Name required');return}const applyTo=ISSUE_TYPES.filter(t=>{try{return document.getElementById('af-it-'+t.replace('-','')).checked}catch(e){return false}});setState({customFields:[...state.customFields,{id:state.customFields.length+1,name,type:document.getElementById('af-type').value,applyTo,required:document.getElementById('af-req').value==='true'}],modal:null})}

function renderNotifsModal(){return `<div>
  <div class="modal-title">Notifications</div><button class="modal-close" onclick="closeModal()">×</button>
  ${state.notifications.map(n=>`<div style="display:flex;align-items:flex-start;gap:10px;padding:12px 0;border-bottom:1px solid var(--gray-100)"><div style="width:8px;height:8px;border-radius:50%;background:${n.read?'var(--gray-300)':'var(--blue)'};margin-top:5px;flex-shrink:0"></div><div><div style="font-size:13px;font-weight:${n.read?400:600}">${n.text}</div><div style="font-size:11px;color:var(--gray-400);margin-top:2px">${n.time}</div></div></div>`).join('')}
  <div style="text-align:right;margin-top:10px"><button class="btn btn-ghost" onclick="state.notifications.forEach(n=>n.read=true);closeModal()">Mark all read</button></div>
  </div>`}

function rSimple(title,ph,action){return `<div><div class="modal-title">${title}</div><button class="modal-close" onclick="closeModal()">×</button><div class="form-group"><label class="form-label">${ph} *</label><input class="form-input" id="sm-val" placeholder="${ph}"/></div><div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="subSimple('${action}')">Create</button></div></div>`}
function subSimple(action){const val=document.getElementById('sm-val').value.trim();if(!val)return;if(action==='addGroup')setState({groups:[...state.groups,val],modal:null});else if(action==='addRole')setState({roles:[...state.roles,val],modal:null})}

// ============================================================
// BOOTSTRAP
// ============================================================
render=function(){
  document.getElementById('root').innerHTML=renderApp();
  document.addEventListener('keydown',function(e){if(e.key==='Escape'&&state.modal)closeModal()},{once:true});
};
window.setState=setState;window.nav=nav;window.navSettings=navSettings;
window.doLogin=doLogin;window.doLogout=doLogout;
window.openModal=openModal;window.closeModal=closeModal;
window.openProject=openProject;window.viewTicket=viewTicket;
window.updateTicket=updateTicket;window.deleteTicketConfirm=deleteTicketConfirm;
window.subCT=subCT;window.subET=subET;window.subCP=subCP;window.subSF=subSF;
window.subAU=subAU;window.subEU=subEU;window.subAF=subAF;window.subSimple=subSimple;
window.toggleUser=toggleUser;window.removeUser=removeUser;
window.toggleConnector=toggleConnector;window.deleteFilter=deleteFilter;
window.setBoardType=setBoardType;window.loadFilterToSearch=loadFilterToSearch;
window.toggleBoardAssignee=toggleBoardAssignee;
window.toggleFilterDropdown=toggleFilterDropdown;window.toggleFilterArr=toggleFilterArr;
window.toggleProjectFilter=toggleProjectFilter;window.clearAllFilters=clearAllFilters;
window.toggleRoadmapRow=toggleRoadmapRow;
window.expandAllRoadmap=expandAllRoadmap;window.collapseAllRoadmap=collapseAllRoadmap;
window.subCD=subCD;window.deleteCustomDashboard=deleteCustomDashboard;window.toggleProjectsSidebar=toggleProjectsSidebar;
window.subED=subED;window.toggleRoadmapProjectFilter=toggleRoadmapProjectFilter;
render();
</script>
</body>
</html>
